title: TTNRT Status
buildFuture: true
defaultContentLanguage: en
languageCode: en
baseURL: /
theme: statustt-custom
preserveTaxonomyNames: true
taxonomies:
  affected: affected
outputs:
  page:
    - html
    - json
  section:
    - html
    - json
    - rss
  home:
    - html
    - json
    - rss
    - svg
  term:
    - html
    - json
    - rss
    - svg
outputFormats:
  svg:
    isPlainText: true
    mediaType: image/svg+xml
enableGitInfo: true
params:
  skipSeconds: false
  useRelativeTime: true
  disableDarkMode: false
  shortDateFormat: 15:04 UTC — Jan 2
  down: "#e60000"
  systems:
    - name: TTGit
      category: US East
      link: https://git.ttnrtsite.me
      description: Hosting your code!
    - name: CDN
      category: US East
      link: https://cdn.ttnrtsite.me
      description: Content Delivery Network
    - name: TTWeb
      category: US East
      link: https://ttnrtsite.me
      description: Our default website
    - name: STVRadio
      category: Other Services
      description: Listening to music
    - name: AssistAI
      category: US Midwest
      description: A powerful AI assistant
      link: https://assist.ttnrtsite.me
    - name: TTPages
      description: Static pages server
      category: US Midwest
    - name: API
      category: US Midwest
      description: Used for accessing the TTNRT API
      link: https://api.ttnrtsite.me/
  dateFormat: January 2, 2006 at 3:04 PM UTC
  brand: "#0a0c0f"
  enableLastMod: true
  headerTextColor: white
  logo: /img/logo.png
  incidentPostsPerPage: 10
  googleAnalytics: UA-00000000-1
  alwaysKeepBrandColor: true
  disableComplexCalculations: false
  useLogo: true
  disrupted: "#cc4400"
  notice: "#24478f"
  incidentHistoryFormat: yearly
  disableIncidentHistory: false
  ok: "#008000"
  categories:
    - name: US East
      description: The main site in South Carolina
      closed: false
    - name: US Midwest
      description: The second site in Michigan
      closed: false
    - name: Other Services
      description: Separate services we have hosted
      closed: true
  description: Check for any outages or issues here!
  enableCustomHTML: true
  useLargeHeaderDesign: false
enableCustomHTML: true
